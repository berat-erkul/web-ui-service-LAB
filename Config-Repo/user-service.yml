spring:
  sleuth:
    sampler:
      probability: 1
  zipkin:
    base-url: http://localhost:9411

  application:
    name: user-service

  cloud:
    loadbalancer:
      ribbon:
        enabled: false

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create
    show-sql: true

  datasource:
    driver-class-name: org.postgresql.Driver
    initialization-mode: always

server:
  port: 8081

keycloak:
  realm: cydeo-dev
  auth-server-url: http://localhost:9090
  ssl-required: none
  resource: ticketing-app
  use-resource-role-mappings: true
  bearer-only: true

eureka:
  instance:
    preferIpAddress: true
    ipAddress: 127.0.0.1
    status-page-url-path: ${management.context-path}/info
    health-check-url-path: ${management.context-path}/health
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

management:
  endpoint:
    health:
      show-details: ALWAYS
  endpoints:
    web:
      exposure:
        include: "*"
  context-path: /actuator

info:
  application:
    name: user-service
    description: Ticketing Application User Service

resilience4j:
  circuitbreaker:
    instances:
      project-service:
        baseConfig: default
      task-service:
        baseConfig: default
        waitDurationInOpenState: 2000
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10000
        automaticTransitionFromOpenToHalfOpenEnabled: true
        permittedNumberOfCallsInHalfOpenState: 2

  retry:
    instances:
      project-service:
        baseConfig: default
      task-service:
        baseConfig: default
    configs:
      default:
        maxAttempts: 3
        waitDuration: 200

  bulkhead:
    instances:
      project-service:
        baseConfig: default
      task-service:
        baseConfig: default
    configs:
      default:
        limitForPeriod: 5
        limitRefreshPeriod: 50000
        timeoutDuration: 2000
