<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(pageTitle, content)">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${pageTitle} ?: 'Ticketing App'">Ticketing App</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <style>
        body { background-color: #f8f9fa; }
        .sidebar { min-height: 100vh; background-color: #212529; }
        .sidebar .nav-link { color: #adb5bd; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background-color: #343a40; border-radius: 4px; }
        .sidebar .nav-link i { margin-right: 8px; }
        .main-content { padding: 2rem; }
    </style>
</head>
<body>
<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <nav class="col-md-2 d-md-block sidebar py-3 px-2">
            <div class="text-white fw-bold fs-5 mb-4 px-2">
                <i class="bi bi-ticket-perforated-fill me-2"></i>Ticketing
            </div>
            <ul class="nav flex-column gap-1">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/dashboard}"
                       th:classappend="${#httpServletRequest.requestURI == '/dashboard'} ? 'active'">
                        <i class="bi bi-speedometer2"></i>Dashboard
                    </a>
                </li>

                <!-- Users: Admin only -->
                <li class="nav-item" sec:authorize="hasRole('Admin')">
                    <a class="nav-link" th:href="@{/users}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/users')} ? 'active'">
                        <i class="bi bi-people-fill"></i>Users
                    </a>
                </li>

                <!-- Projects: Admin + Manager -->
                <li class="nav-item" sec:authorize="hasAnyRole('Admin','Manager')">
                    <a class="nav-link" th:href="@{/projects}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/projects')} ? 'active'">
                        <i class="bi bi-kanban-fill"></i>Projects
                    </a>
                </li>

                <!-- Tasks (by project): Admin + Manager -->
                <li class="nav-item" sec:authorize="hasAnyRole('Admin','Manager')">
                    <a class="nav-link" th:href="@{/tasks}"
                       th:classappend="${#httpServletRequest.requestURI.startsWith('/tasks')} ? 'active'">
                        <i class="bi bi-list-check"></i>Tasks
                    </a>
                </li>

                <!-- Employee task views -->
                <li class="nav-item" sec:authorize="hasRole('Employee')">
                    <a class="nav-link" th:href="@{/tasks/pending}"
                       th:classappend="${#httpServletRequest.requestURI == '/tasks/pending'} ? 'active'">
                        <i class="bi bi-list-task"></i>My Tasks
                    </a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('Employee')">
                    <a class="nav-link" th:href="@{/tasks/archive}"
                       th:classappend="${#httpServletRequest.requestURI == '/tasks/archive'} ? 'active'">
                        <i class="bi bi-archive"></i>Completed
                    </a>
                </li>
            </ul>
            <hr class="border-secondary"/>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <button type="submit" class="nav-link btn btn-link text-danger p-0 px-2">
                            <i class="bi bi-box-arrow-left me-1"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </nav>

        <!-- Main content area -->
        <main class="col-md-10 ms-sm-auto main-content">
            <!-- Top bar -->
            <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                <h4 th:text="${pageTitle} ?: 'Dashboard'" class="mb-0 fw-semibold">Dashboard</h4>
                <span class="text-muted small">
                    <i class="bi bi-person-circle me-1"></i>
                    <span sec:authentication="name">User</span>
                </span>
            </div>

            <!-- Page content injected here -->
            <div th:replace="${content}">
                <p>Content goes here.</p>
            </div>
        </main>

    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
