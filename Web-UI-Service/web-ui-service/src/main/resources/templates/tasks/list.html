<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(pageTitle='Tasks', content=~{::content})}">
<head><title>Tasks</title></head>
<body>
<th:block th:fragment="content">

    <!-- Flash banners -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${fetchError}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${fetchError}"></span>
    </div>

    <!-- Project filter form -->
    <div class="card border-0 shadow-sm mb-3">
        <div class="card-body">
            <form method="get" th:action="@{/tasks}" class="d-flex gap-2 align-items-end flex-wrap">
                <div>
                    <label for="projectCode" class="form-label mb-1 small fw-semibold">Project Code</label>
                    <input type="text" id="projectCode" name="projectCode"
                           th:value="${projectCode}"
                           class="form-control form-control-sm text-uppercase"
                           placeholder="XYZAB" maxlength="5" style="width:140px;"/>
                </div>
                <button type="submit" class="btn btn-primary btn-sm">
                    <i class="bi bi-search me-1"></i>Load Tasks
                </button>
                <span th:if="${projectCode != null}"
                      class="text-muted small align-self-center">
                    Showing tasks for project <code th:text="${projectCode}"></code>
                </span>
            </form>
        </div>
    </div>

    <!-- Toolbar: create (Manager only) -->
    <div th:if="${projectCode != null}"
         class="d-flex justify-content-end mb-3"
         sec:authorize="hasRole('Manager')">
        <a th:href="@{/tasks/create(projectCode=${projectCode})}" class="btn btn-primary btn-sm">
            <i class="bi bi-plus-circle me-1"></i>Create Task
        </a>
    </div>

    <!-- No projectCode yet -->
    <div th:if="${projectCode == null}" class="alert alert-info" role="alert">
        <i class="bi bi-info-circle me-2"></i>Enter a project code above to view its tasks.
    </div>

    <!-- Empty state (projectCode given but no tasks) -->
    <div th:if="${projectCode != null and (tasks == null or tasks.isEmpty()) and fetchError == null}"
         class="alert alert-info" role="alert">
        <i class="bi bi-info-circle me-2"></i>No tasks found for this project.
    </div>

    <!-- Task table -->
    <div th:unless="${tasks == null or tasks.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Code</th>
                        <th>Subject</th>
                        <th>Employee</th>
                        <th>Status</th>
                        <th>Assigned</th>
                        <th sec:authorize="hasRole('Manager')">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t, stat : ${tasks}">
                        <td th:text="${stat.count}" class="text-muted small"></td>
                        <td><code th:text="${t.taskCode}"></code></td>
                        <td th:text="${t.taskSubject}"></td>
                        <td th:text="${t.assignedEmployee}"></td>
                        <td>
                            <span class="badge"
                                  th:text="${t.taskStatus}"
                                  th:classappend="${t.taskStatus == 'COMPLETED'}   ? 'bg-success'
                                               : (${t.taskStatus == 'IN_PROGRESS'} ? 'bg-primary'
                                               :                                     'bg-secondary')">
                            </span>
                        </td>
                        <td th:text="${t.assignedDate}"></td>
                        <td sec:authorize="hasRole('Manager')">
                            <div class="d-flex gap-1 flex-nowrap">
                                <a th:href="@{/tasks/edit/{c}(c=${t.taskCode})}"
                                   class="btn btn-outline-primary btn-sm" title="Edit">
                                    <i class="bi bi-pencil-fill"></i>
                                </a>
                                <form th:action="@{/tasks/delete/{c}(c=${t.taskCode})}"
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('Delete task ' + this.dataset.code + '?');"
                                      th:data-code="${t.taskCode}">
                                    <input type="hidden" name="projectCode" th:value="${projectCode}"/>
                                    <button type="submit" class="btn btn-outline-danger btn-sm" title="Delete">
                                        <i class="bi bi-trash-fill"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
