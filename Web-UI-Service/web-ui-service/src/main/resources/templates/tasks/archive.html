<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Completed Tasks', content=~{::content})}">
<head><title>Completed Tasks</title></head>
<body>
<th:block th:fragment="content">

    <div th:if="${fetchError}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${fetchError}"></span>
    </div>

    <!-- Quick link back to pending -->
    <div class="d-flex justify-content-end mb-3">
        <a th:href="@{/tasks/pending}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-list-task me-1"></i>Pending Tasks
        </a>
    </div>

    <!-- Empty state -->
    <div th:if="${tasks == null or tasks.isEmpty() and fetchError == null}"
         class="alert alert-info" role="alert">
        <i class="bi bi-info-circle me-2"></i>No completed tasks yet.
    </div>

    <!-- Task table -->
    <div th:unless="${tasks == null or tasks.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Code</th>
                        <th>Subject</th>
                        <th>Project</th>
                        <th>Status</th>
                        <th>Assigned</th>
                        <th>Last Updated</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="t, stat : ${tasks}">
                        <td th:text="${stat.count}" class="text-muted small"></td>
                        <td><code th:text="${t.taskCode}"></code></td>
                        <td th:text="${t.taskSubject}"></td>
                        <td><code th:text="${t.projectCode}"></code></td>
                        <td>
                            <span class="badge bg-success" th:text="${t.taskStatus}"></span>
                        </td>
                        <td th:text="${t.assignedDate}"></td>
                        <td th:text="${t.lastUpdateDateTime}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
