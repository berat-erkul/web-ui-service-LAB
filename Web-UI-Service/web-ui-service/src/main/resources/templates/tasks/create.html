<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Create Task', content=~{::content})}">
<head><title>Create Task</title></head>
<body>
<th:block th:fragment="content">

    <div th:if="${apiError}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${apiError}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card border-0 shadow-sm" style="max-width: 620px;">
        <div class="card-body">
            <form th:action="@{/tasks/create}" th:object="${taskForm}"
                  method="post" novalidate>

                <div class="row g-3">

                    <!-- Task Subject -->
                    <div class="col-md-8">
                        <label for="taskSubject" class="form-label">
                            Task Subject <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="taskSubject" th:field="*{taskSubject}"
                               th:classappend="${#fields.hasErrors('taskSubject')} ? 'is-invalid'"
                               class="form-control" placeholder="e.g. Fix login bug"/>
                        <div class="form-text">3–16 characters.</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('taskSubject')}">
                            <span th:errors="*{taskSubject}"></span>
                        </div>
                    </div>

                    <!-- Task Code -->
                    <div class="col-md-4">
                        <label for="taskCode" class="form-label">
                            Task Code <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="taskCode" th:field="*{taskCode}"
                               th:classappend="${#fields.hasErrors('taskCode')} ? 'is-invalid'"
                               class="form-control text-uppercase" placeholder="XYZAB"
                               maxlength="5"/>
                        <div class="form-text">Exactly 5 characters.</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('taskCode')}">
                            <span th:errors="*{taskCode}"></span>
                        </div>
                    </div>

                    <!-- Project Code -->
                    <div class="col-md-6">
                        <label for="projectCode" class="form-label">
                            Project Code <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="projectCode" th:field="*{projectCode}"
                               th:classappend="${#fields.hasErrors('projectCode')} ? 'is-invalid'"
                               class="form-control text-uppercase" placeholder="XYZAB"
                               maxlength="5"/>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('projectCode')}">
                            <span th:errors="*{projectCode}"></span>
                        </div>
                    </div>

                    <!-- Assigned Employee -->
                    <div class="col-md-6">
                        <label for="assignedEmployee" class="form-label">
                            Assigned Employee <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="assignedEmployee" th:field="*{assignedEmployee}"
                               th:classappend="${#fields.hasErrors('assignedEmployee')} ? 'is-invalid'"
                               class="form-control" placeholder="employee@example.com"/>
                        <div class="form-text">Employee username (email).</div>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('assignedEmployee')}">
                            <span th:errors="*{assignedEmployee}"></span>
                        </div>
                    </div>

                    <!-- Task Status (optional on create) -->
                    <div class="col-md-6">
                        <label for="taskStatus" class="form-label">Status</label>
                        <select id="taskStatus" th:field="*{taskStatus}" class="form-select">
                            <option value="">— Default (OPEN) —</option>
                            <option th:each="s : ${statusOptions}"
                                    th:value="${s.name()}" th:text="${s.displayValue}"></option>
                        </select>
                    </div>

                    <!-- Task Detail -->
                    <div class="col-12">
                        <label for="taskDetail" class="form-label">Details</label>
                        <textarea id="taskDetail" th:field="*{taskDetail}"
                                  class="form-control" rows="3"
                                  placeholder="Optional description…"></textarea>
                    </div>

                </div>

                <hr class="my-4"/>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-plus-circle me-1"></i>Create Task
                    </button>
                    <a th:href="${taskForm.projectCode != null and !taskForm.projectCode.isEmpty()} ? @{/tasks(projectCode=${taskForm.projectCode})} : @{/tasks}"
                       class="btn btn-outline-secondary">Cancel</a>
                </div>

            </form>
        </div>
    </div>

</th:block>
</body>
</html>
