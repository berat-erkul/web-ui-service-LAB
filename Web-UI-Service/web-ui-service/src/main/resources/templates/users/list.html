<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(pageTitle='Users', content=~{::content})}">
<head><title>Users</title></head>
<body>
<th:block th:fragment="content">

    <div th:if="${fetchError}" class="alert alert-danger" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <span th:text="${fetchError}"></span>
    </div>

    <div th:if="${users == null or users.isEmpty() and fetchError == null}" class="alert alert-info" role="alert">
        <i class="bi bi-info-circle me-2"></i>No users found.
    </div>

    <div th:unless="${users == null or users.isEmpty()}" class="card border-0 shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Name</th>
                        <th>Username</th>
                        <th>Phone</th>
                        <th>Role</th>
                        <th>Gender</th>
                        <th>Status</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="user, stat : ${users}">
                        <td th:text="${stat.count}" class="text-muted small"></td>
                        <td th:text="${user.firstName + ' ' + user.lastName}"></td>
                        <td th:text="${user.userName}"></td>
                        <td th:text="${user.phone}"></td>
                        <td>
                            <span th:text="${user.role?.description}" class="badge bg-secondary"></span>
                        </td>
                        <td th:text="${user.gender}"></td>
                        <td>
                            <span th:if="${user.enabled}" class="badge bg-success">Active</span>
                            <span th:unless="${user.enabled}" class="badge bg-danger">Inactive</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</th:block>
</body>
</html>
