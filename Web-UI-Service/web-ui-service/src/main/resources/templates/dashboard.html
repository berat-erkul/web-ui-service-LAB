<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{layout :: layout(pageTitle='Dashboard', content=~{::content})}">
<head>
    <title>Dashboard</title>
</head>
<body>
<th:block th:fragment="content">

    <div class="row g-4 mb-4">

        <!-- Users card: Admin only -->
        <div class="col-md-4" sec:authorize="hasRole('Admin')">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-people-fill text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">User Management</div>
                        <a th:href="@{/users}" class="fw-semibold text-decoration-none stretched-link">View All Users</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Projects card: Admin + Manager -->
        <div class="col-md-4" sec:authorize="hasAnyRole('Admin','Manager')">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-kanban-fill text-success fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Project Management</div>
                        <a th:href="@{/projects}" class="fw-semibold text-decoration-none stretched-link">View All Projects</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tasks card: Admin + Manager -->
        <div class="col-md-4" sec:authorize="hasAnyRole('Admin','Manager')">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-warning bg-opacity-10 p-3">
                        <i class="bi bi-list-check text-warning fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">Task Management</div>
                        <a th:href="@{/tasks}" class="fw-semibold text-decoration-none stretched-link">View Tasks</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- My Pending Tasks card: Employee -->
        <div class="col-md-4" sec:authorize="hasRole('Employee')">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-primary bg-opacity-10 p-3">
                        <i class="bi bi-list-task text-primary fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">My Work</div>
                        <a th:href="@{/tasks/pending}" class="fw-semibold text-decoration-none stretched-link">My Pending Tasks</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Completed Tasks card: Employee -->
        <div class="col-md-4" sec:authorize="hasRole('Employee')">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body d-flex align-items-center gap-3">
                    <div class="rounded-circle bg-success bg-opacity-10 p-3">
                        <i class="bi bi-archive text-success fs-4"></i>
                    </div>
                    <div>
                        <div class="text-muted small">History</div>
                        <a th:href="@{/tasks/archive}" class="fw-semibold text-decoration-none stretched-link">Completed Tasks</a>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h6 class="card-title text-muted mb-1">Welcome</h6>
            <p class="mb-0">
                Logged in as <strong sec:authentication="name">User</strong>.
                Use the cards above or the sidebar to navigate.
            </p>
        </div>
    </div>

</th:block>
</body>
</html>
